<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg-hot:#0c0a09;--fg-hot:#f5f0eb;--muted-hot:#8a8078;--accent:#c4713b;--accent2:#d4956a;
    --bg-cool:#f2f7f4;--fg-cool:#2a3a34;--muted-cool:#7a9e8c;--accent-cool:#4a9e88;--accent2-cool:#7ec4b0;
    --serif:'Cormorant Garamond',Georgia,serif;--sans:'Noto Sans JP','Helvetica Neue',sans-serif;
  }
  body{font-family:var(--sans);color:var(--fg-hot);background:var(--bg-hot);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  button{font-family:var(--sans);border-radius:0;-webkit-appearance:none}

  /* Animations */
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slowPulse{0%,100%{opacity:.3}50%{opacity:.6}}
  @keyframes textGlow{0%,100%{text-shadow:0 0 20px rgba(196,113,59,0)}50%{text-shadow:0 0 40px rgba(196,113,59,.15)}}

  /* ═══ Steam — ロウリュのブワ〜〜〜 ═══
     設計思想：
     - 「もくもく」(小粒が多数上昇) ではなく「ブワ〜」(熱波が放射状に広がる)
     - 少数の大きな要素、低密度、blurは控えめ(5-15px)でしっかり見せる
     - mix-blend-mode: screen で暗い背景に溶け込む暖色の光
     - will-change で GPU アクセラレーション
  */
  @keyframes steamSpread{
    0%{transform:scale(.8) translateY(0);opacity:0;filter:blur(8px)}
    20%{transform:scale(1.2) translateY(-3vh);opacity:.35;filter:blur(10px)}
    45%{transform:scale(1.9) translateY(-10vh);opacity:.28;filter:blur(12px)}
    75%{transform:scale(2.8) translateY(-20vh);opacity:.1;filter:blur(14px)}
    100%{transform:scale(3.5) translateY(-30vh);opacity:0;filter:blur(18px)}
  }
  @keyframes steamWander{
    0%{transform:scale(.9) translate(0,0);opacity:0;filter:blur(6px)}
    18%{transform:scale(1.2) translate(1vw,-2vh);opacity:.3;filter:blur(8px)}
    40%{transform:scale(1.7) translate(3vw,-6vh);opacity:.22;filter:blur(10px)}
    70%{transform:scale(2.4) translate(-1vw,-14vh);opacity:.08;filter:blur(13px)}
    100%{transform:scale(3) translate(1vw,-22vh);opacity:0;filter:blur(16px)}
  }
  @keyframes steamBreathe{
    0%,100%{transform:scale(1);opacity:.06;filter:blur(22px)}
    50%{transform:scale(1.12);opacity:.15;filter:blur(26px)}
  }

  /* Door / Transition */
  @keyframes doorLeft{0%{transform:translateX(0)}100%{transform:translateX(-105%)}}
  @keyframes doorRight{0%{transform:translateX(0)}100%{transform:translateX(105%)}}
  @keyframes lightFlood{0%{opacity:0}20%{opacity:1}60%{opacity:1}100%{opacity:0}}
  @keyframes breatheIn{0%{opacity:0;transform:scale(.94) translateY(20px)}40%{opacity:.6}100%{opacity:1;transform:scale(1) translateY(0)}}

  /* Gaikiyoku particles */
  @keyframes floatUp{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:.4}90%{opacity:.2}100%{transform:translateY(-80px) translateX(10px);opacity:0}}
  @keyframes shimmer{0%,100%{opacity:.15}50%{opacity:.35}}

  .steam-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden;transition:opacity 1s ease;mix-blend-mode:screen}
  /* spread: メインの熱波。巨大でソフト。重なり合う。 */
  .steam-spread{
    position:absolute;border-radius:50%;
    background:radial-gradient(circle,rgba(190,140,90,.6) 0%,rgba(170,115,65,.3) 25%,rgba(150,95,45,.12) 50%,rgba(130,80,35,.03) 70%,transparent 85%);
    mix-blend-mode:screen;will-change:transform,opacity,filter;
    animation:steamSpread ease-in-out infinite;
  }
  /* wander: spreadの間を埋める副波 */
  .steam-wander{
    position:absolute;border-radius:50%;
    background:radial-gradient(circle,rgba(210,170,130,.5) 0%,rgba(190,145,100,.2) 30%,rgba(170,120,70,.06) 55%,transparent 80%);
    mix-blend-mode:screen;will-change:transform,opacity,filter;
    animation:steamWander ease-in-out infinite;
  }
  /* breathe: 空間全体を覆う暖気。画面の大部分をカバー。 */
  .steam-breathe{
    position:absolute;border-radius:50%;
    background:radial-gradient(ellipse,rgba(196,113,59,.2) 0%,rgba(180,100,50,.08) 35%,rgba(160,80,40,.02) 55%,transparent 75%);
    mix-blend-mode:screen;will-change:transform,opacity;
    animation:steamBreathe ease-in-out infinite;
  }
  .heat-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 110%,rgba(196,113,59,.15) 0%,rgba(180,120,70,.06) 35%,rgba(150,100,60,.02) 55%,transparent 70%);pointer-events:none;z-index:0;transition:opacity 1s ease}
  .content{position:relative;z-index:1}

  /* Door overlay */
  .door-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;pointer-events:none;display:none}
  .door-overlay.active{display:block;pointer-events:all}
  .door-left,.door-right{position:absolute;top:0;bottom:0;width:50%;background:var(--bg-hot)}
  .door-left{left:0;border-right:1px solid rgba(196,113,59,.15)}
  .door-right{right:0;border-left:1px solid rgba(196,113,59,.15)}
  .door-left.open{animation:doorLeft 1.8s cubic-bezier(.77,0,.18,1) forwards}
  .door-right.open{animation:doorRight 1.8s cubic-bezier(.77,0,.18,1) forwards}
  .door-light{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.97);animation:lightFlood 3s ease-out forwards}
  .door-handle{position:absolute;top:50%;width:3px;height:40px;background:rgba(196,113,59,.3);border-radius:2px}
  .door-left .door-handle{right:20px;transform:translateY(-50%)}
  .door-right .door-handle{left:20px;transform:translateY(-50%)}
  .door-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--serif);font-size:clamp(1rem,3vw,1.4rem);color:rgba(245,240,235,.3);letter-spacing:.3em;text-transform:uppercase;white-space:nowrap}

  /* Nav buttons */
  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid rgba(245,240,235,.05)}
  .nav-btn{background:transparent;color:var(--muted-hot);border:1px solid rgba(245,240,235,.1);padding:.6rem 1.5rem;font-size:.65rem;letter-spacing:.2em;cursor:pointer;text-transform:uppercase;transition:all .3s ease}
  .nav-btn:hover{border-color:var(--accent);color:var(--accent)}
  .nav-btn.primary{border-color:var(--accent);color:var(--accent)}
  .nav-btn.primary:hover{background:var(--accent);color:var(--bg-hot)}
  .nav-btn:disabled{opacity:.2;pointer-events:none}
  .nav-counter{font-size:.6rem;letter-spacing:.2em;color:rgba(245,240,235,.2)}

  /* ═══ Gaikiyoku — ふわり〜〜〜っとした外気浴 ═══ */
  @keyframes gaiDrift{0%{transform:translateY(0) translateX(0) scale(1);opacity:0}8%{opacity:1}85%{opacity:.3}100%{transform:translateY(-105vh) translateX(30px) scale(1.6);opacity:0}}
  @keyframes gaiDriftSlow{0%{transform:translateY(0) translateX(0) scale(1);opacity:0}6%{opacity:.5}75%{opacity:.15}100%{transform:translateY(-95vh) translateX(-25px) scale(2);opacity:0}}
  @keyframes skyBreathe{0%,100%{opacity:.5}50%{opacity:.8}}
  @keyframes windStreak{0%{transform:translateX(-100%);opacity:0}15%{opacity:1}50%{opacity:.5}100%{transform:translateX(100vw);opacity:0}}
  @keyframes gentleSway{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(.3deg)}}
  @keyframes sunRay{0%,100%{opacity:.06}50%{opacity:.14}}
  @keyframes floatSection{from{opacity:0;transform:translateY(60px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

  .gai-particle{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
  .gai-particle--orb{background:radial-gradient(circle,rgba(74,158,136,.12),rgba(74,158,136,.02) 60%,transparent);filter:blur(4px);animation:gaiDrift linear infinite}
  .gai-particle--large{background:radial-gradient(circle,rgba(74,158,136,.06),rgba(126,196,176,.02) 50%,transparent);filter:blur(20px);animation:gaiDriftSlow linear infinite}
  .gai-particle--light{background:radial-gradient(circle,rgba(255,255,255,.5),rgba(255,255,255,.08) 60%,transparent);filter:blur(3px);animation:gaiDrift linear infinite}
  .gai-particle--dust{background:rgba(42,58,52,.08);filter:blur(1px);animation:gaiDrift linear infinite}

  /* Sky — 明るい空、柔らかい光 */
  .gai-sky{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;opacity:0;transition:opacity 2.5s ease}
  .gai-sky.active{opacity:1}
  .gai-sky__gradient{position:absolute;inset:0;background:linear-gradient(180deg,rgba(200,230,220,.5) 0%,rgba(242,247,244,.2) 40%,transparent 65%);animation:skyBreathe 10s ease-in-out infinite}
  .gai-sky__moonbeam{position:absolute;top:-10%;right:10%;width:300px;height:140vh;background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(74,158,136,.02) 60%,transparent);transform:rotate(12deg);transform-origin:top center;animation:sunRay 8s ease-in-out infinite}
  .gai-sky__moonbeam2{position:absolute;top:-10%;left:15%;width:220px;height:120vh;background:linear-gradient(180deg,rgba(74,158,136,.06),transparent);transform:rotate(-8deg);transform-origin:top center;animation:sunRay 12s ease-in-out infinite;animation-delay:4s}
  /* Wind — ふわりと流れる風 */
  .gai-wind{position:fixed;pointer-events:none;z-index:0;height:1px;background:linear-gradient(90deg,transparent,rgba(74,158,136,.1) 30%,rgba(74,158,136,.04) 70%,transparent);animation:windStreak linear infinite}
  .gai-wind--wide{position:fixed;pointer-events:none;z-index:0;height:3px;background:linear-gradient(90deg,transparent,rgba(74,158,136,.06) 20%,rgba(126,196,176,.03) 80%,transparent);animation:windStreak linear infinite;filter:blur(1px)}
</style>
</head>
<body>
<div class="steam-container" id="steamBox"></div>
<div class="heat-overlay" id="heatOverlay"></div>
<!-- Gaikiyoku sky overlay (hidden until door opens) -->
<div class="gai-sky" id="gaiSky">
  <div class="gai-sky__gradient"></div>
  <div class="gai-sky__moonbeam"></div>
  <div class="gai-sky__moonbeam2"></div>
</div>
<div class="door-overlay" id="doorOverlay">
  <div class="door-left" id="doorL"><div class="door-handle"></div></div>
  <div class="door-right" id="doorR"><div class="door-handle"></div></div>
  <div class="door-text" id="doorText"></div>
</div>
<div class="content" id="app"></div>

<script>
// ─── STEAM INIT ────────────────────────────────────
(function(){
  const box=document.getElementById('steamBox');
  // ─── ブワ〜〜〜ッ ─── 重なり合う湯気
  // spread: 巨大な熱波。画面幅の30-60%を覆う塊が重なり合う。
  const spreads=[
    {x:'-5%', b:'-5%',sz:450,dur:8,  phase:.1},
    {x:'30%', b:'-8%',sz:500,dur:9,  phase:.35},
    {x:'60%', b:'-3%',sz:420,dur:7.5,phase:.6},
    {x:'10%', b:'-6%',sz:480,dur:10, phase:.85},
    {x:'45%', b:'-4%',sz:520,dur:8.5,phase:.2},
    {x:'75%', b:'-7%',sz:460,dur:9.5,phase:.5},
    {x:'20%', b:'-2%',sz:400,dur:7,  phase:.75},
    {x:'55%', b:'-5%',sz:490,dur:8,  phase:.45},
    {x:'-10%',b:'-3%',sz:440,dur:9,  phase:.9},
  ];
  spreads.forEach(c=>{
    const s=document.createElement('div');s.className='steam-spread';
    s.style.left=c.x;s.style.bottom=c.b;
    s.style.width=c.sz+'px';s.style.height=c.sz+'px';
    s.style.animationDuration=c.dur+'s';
    // 負のdelayでアニメ途中からスタート（最初から自然にバラけている）
    s.style.animationDelay=(-c.dur*c.phase)+'s';
    box.appendChild(s);
  });
  // wander: spreadの隙間を埋めるように漂う
  const wanders=[
    {x:'15%', b:'5%', sz:350,dur:11, phase:.15},
    {x:'50%', b:'2%', sz:380,dur:12, phase:.4},
    {x:'5%',  b:'8%', sz:320,dur:10, phase:.65},
    {x:'70%', b:'3%', sz:360,dur:11.5,phase:.3},
    {x:'35%', b:'6%', sz:400,dur:13, phase:.8},
    {x:'80%', b:'4%', sz:340,dur:10.5,phase:.55},
    {x:'25%', b:'1%', sz:370,dur:12.5,phase:.1},
  ];
  wanders.forEach(c=>{
    const s=document.createElement('div');s.className='steam-wander';
    s.style.left=c.x;s.style.bottom=c.b;
    s.style.width=c.sz+'px';s.style.height=c.sz+'px';
    s.style.animationDuration=c.dur+'s';
    s.style.animationDelay=(-c.dur*c.phase)+'s';
    box.appendChild(s);
  });
  // breathe: 画面全体を覆う巨大な暖気の層
  [
    {x:'-10%',y:'30%',w:600,h:400,dur:8,phase:.2},
    {x:'30%', y:'20%',w:550,h:350,dur:7,phase:.6},
    {x:'10%', y:'50%',w:500,h:380,dur:9,phase:.9},
  ].forEach(c=>{
    const s=document.createElement('div');s.className='steam-breathe';
    s.style.left=c.x;s.style.top=c.y;
    s.style.width=c.w+'px';s.style.height=c.h+'px';
    s.style.animationDuration=c.dur+'s';
    s.style.animationDelay=(-c.dur*c.phase)+'s';
    box.appendChild(s);
  });
})();

// ─── DATA ──────────────────────────────────────────
/* ═══ 6軸 SCORING FRAMEWORK ═══════════════════════════
  サウナ体験の多面的分析に基づく6次元プロファイル：
  ┌─ 身体 ──────────────────────────────────────────┐
  │ autonomic  自律神経力     温冷交代浴への適応力・HSP応答                 │
  │            — 参考: Laukkanen et al.(2015) JAMA Internal Medicine        │
  │ recovery   深層回復力     副交感神経優位への移行・深部体温サイクリング  │
  │            — 参考: Hussain & Cohen(2018) 冷水浸漬と身体回復            │
  ├─ 心理 ──────────────────────────────────────────┤
  │ sensory    感覚開放度     五感で熱を味わう傾向                         │
  │            — 参考: Big Five 開放性 / Csikszentmihalyi フロー理論       │
  │ social     社会的距離感   孤独の聖域 vs 裸のコミュニティ               │
  │            — 参考: Hall 近接学 / フィンランド入浴文化研究              │
  ├─ 哲学 ──────────────────────────────────────────┤
  │ introspect 内省深度       熱の中での瞑想・自己対話の深さ               │
  │            — 参考: Kabat-Zinn マインドフルネス研究                     │
  │ ritual     儀式性         日常→非日常→再統合の通過儀礼的体験          │
  │            — 参考: Turner リミナリティ理論                             │
  └─────────────────────────────────────────────────┘
  ※各参考文献はこの分野の代表的研究であり、本診断はそれらの知見を
    参考にした体験的フレームワークです。臨床的診断ではありません。

  ═══ 質問設計原則 ═══
  各質問に「主軸」(最大スコア差3)と「副軸」(差1-2)を割当て、
  7問×6軸の42セルで6タイプを最大限に分離する。
  Q1: 主軸=ritual（頻度は儀式性を最もよく反映）
  Q2: 主軸=autonomic（求める熱の強度＝身体の限界設定）
  Q3: 主軸=introspect vs social（内向/外向の最大分離点）
  Q4: 主軸=sensory + ritual（美意識＝感覚と儀式の交差点）
  Q5: 主軸=social（自己の見せ方＝社会的志向の直接表現）
  Q6: 主軸=autonomic（実用的な断熱ニーズ＝身体指標）+ recovery
  Q7: 主軸=sensory + recovery（空間選好＝感覚と回復の環境設定）
*/
const QUESTIONS=[
  {id:"rhythm",label:"01",question:"サウナとの距離感は？",subtext:"あなたの生活リズムを教えてください",bg:"radial-gradient(ellipse at 30% 80%,rgba(196,113,59,.06),transparent 50%)",options:[
    {id:"daily",text:"ほぼ毎日。歯を磨くように通う",sub:"日常の一部として",scores:{autonomic:3,recovery:1,sensory:0,social:1,introspect:0,ritual:0}},
    {id:"weekly",text:"週2〜3回。自分のペースで",sub:"ルーティンとして",scores:{autonomic:2,recovery:2,sensory:1,social:1,introspect:1,ritual:1}},
    {id:"weekend",text:"週末に遠征。特別な体験として",sub:"非日常の探求",scores:{autonomic:1,recovery:0,sensory:3,social:2,introspect:0,ritual:2}},
    {id:"ritual",text:"月1〜2回。儀式のように整う",sub:"神聖な時間",scores:{autonomic:0,recovery:2,sensory:1,social:0,introspect:3,ritual:3}}]},
  {id:"heat",label:"02",question:"求める「熱」の質は？",subtext:"身体が欲する温度帯を選んでください",bg:"radial-gradient(ellipse at 70% 30%,rgba(220,80,30,.08),transparent 50%)",options:[
    {id:"extreme",text:"100℃超。灼熱のドライサウナ",sub:"限界の向こう側へ",scores:{autonomic:3,recovery:1,sensory:0,social:0,introspect:2,ritual:1}},
    {id:"steam",text:"70〜80℃。蒸気が肌を包むスチーム",sub:"しっとりとした熱",scores:{autonomic:1,recovery:2,sensory:3,social:0,introspect:1,ritual:1}},
    {id:"bona",text:"60〜70℃。低温高湿のボナサウナ",sub:"やさしく深く",scores:{autonomic:0,recovery:3,sensory:2,social:0,introspect:2,ritual:2}},
    {id:"outdoor",text:"テントサウナ。自然の中の熱",sub:"風と火の対話",scores:{autonomic:2,recovery:1,sensory:3,social:2,introspect:1,ritual:3}}]},
  {id:"time",label:"03",question:"サウナ室での時間の過ごし方は？",subtext:"熱の中で、あなたは何をしていますか",bg:"radial-gradient(ellipse at 50% 50%,rgba(196,113,59,.05),transparent 50%)",options:[
    {id:"meditate",text:"目を閉じる。自分と向き合う瞑想の時間",sub:"内なる静寂",scores:{autonomic:1,recovery:2,sensory:0,social:0,introspect:3,ritual:2}},
    {id:"focus",text:"12分計を見つめ、呼吸に集中する",sub:"ストイックな集中",scores:{autonomic:3,recovery:1,sensory:0,social:0,introspect:2,ritual:0}},
    {id:"social",text:"友人と語る。サウナは社交の場",sub:"裸の付き合い",scores:{autonomic:0,recovery:0,sensory:1,social:3,introspect:0,ritual:1}},

  silent_minimalist:{name:"Silent Minimalist",nameJa:"沈黙のミニマリスト",subtitle:"引き算の先にある、本質的な熱との対話",description:"あなたの回答を見ると、「内省深度」と「自律神経の安定力」がとても高く出ています。これは、サウナに楽しさや交流よりも、自分の内側と向き合う静けさを求めている方に多い傾向です。おそらくサウナ室では自然と目を閉じて、呼吸のリズムだけに意識が向いていくのではないでしょうか。そのとき脳の中では、普段使いすぎている情報処理の回路が休まり、代わりに内省や創造性に関わる領域が活性化しています。つまりあなたは、サウナ室を無意識に「瞑想空間」として使えている方です。あなたにとってサウナは「足す」場所ではなく「引く」場所。余計な装飾も音楽も会話もいらない。熱と自分だけの時間が、最高の贅沢になります。{{BR}}では、あなたに合うサウナの場所とサウナハットをご案内します。",

// ─── ENGINE ────────────────────────────────────────
const AXES=['autonomic','recovery','sensory','introspect','social','ritual'];
function calcScores(ans){const t={};AXES.forEach(k=>t[k]=0);for(const a of Object.values(ans)){AXES.forEach(k=>t[k]+=a.scores[k]);}const mx=21;const r={};AXES.forEach(k=>r[k]=t[k]/mx*3);return r;}
/* 正規化ユークリッド距離によるアーキタイプ判定
   各軸のスコアを0-3スケールで比較し、6次元空間内で
   ユーザーのプロファイルに最も近い重心を持つタイプを返す。
   距離が小さい＝フィット度が高い */
function matchArchetype(sc){let best=null,bestD=Infinity;for(const[k,a]of Object.entries(ARCHETYPES)){let d2=0;for(const ax of AXES){const diff=sc[ax]-a.center[ax];d2+=diff*diff;}if(d2<bestD){bestD=d2;best=k;}}const r=ARCHETYPES[best];r.id=best;return r;}

// ─── RENDER STATE ──────────────────────────────────

function render(){
  if(state.phase!=='result')window.scrollTo({top:0,behavior:'smooth'});
  switch(state.phase){
    case'intro':renderIntro();break;
    case'question':renderQuestion();break;
    case'analyzing':renderAnalyzing();break;
    case'door':renderDoor();break;
    case'result':renderResult();break;
  }
}

  },1400);

  setTimeout(()=>{
    doorL.classList.add('open');
    doorR.classList.add('open');
    // Insert light flash — big white-out
    const light=document.createElement('div');
    light.className='door-light';
    overlay.appendChild(light);
  },1800);

  // Transition body to cool palette during white-out
  setTimeout(()=>{
    document.body.style.transition='background 2.5s ease, color 2s ease';
    document.body.style.background='var(--bg-cool)';
    document.body.style.color='var(--fg-cool)';
    steamBox.style.opacity='0';
    heatOv.style.opacity='0';
  },2200);

  // Activate gaikiyoku sky overlay
  setTimeout(()=>{
    const sky=document.getElementById('gaiSky');
    if(sky) sky.classList.add('active');
  },3000);

  // Show result — longer hold on white for 外気浴 moment
  setTimeout(()=>{
    overlay.classList.remove('active');
    const lights=overlay.querySelectorAll('.door-light');
    lights.forEach(l=>l.remove());
    doorL.classList.remove('open');
    doorR.classList.remove('open');
    state.phase='result';
    render();
  },4200);
}

// ─── RADAR（6軸・サウナ世界観・トップ5%アニメーション） ─────
function makeRadar(sc){
  const axes=[
    {key:'autonomic',label:'自律神経力',sub:'Autonomic'},
    {key:'recovery',label:'深層回復力',sub:'Recovery'},
    {key:'sensory',label:'感覚開放度',sub:'Sensory'},
    {key:'social',label:'社会的距離感',sub:'Social'},
    {key:'introspect',label:'内省深度',sub:'Introspect'},
    {key:'ritual',label:'儀式性',sub:'Ritual'}
  ];
  const n=axes.length;
  const cx=200,cy=200,r=110,step=Math.PI*2/n;
  const pt=(i,v)=>{const a=step*i-Math.PI/2,d=(v/3)*r;return[cx+d*Math.cos(a),cy+d*Math.sin(a)];};
  const uid='r'+Date.now();

  let svg=`<svg viewBox="0 0 400 400" style="width:100%;max-width:460px">`;

  // ═══ DEFS: グラデーション・フィルター ═══
  svg+=`<defs>
    <radialGradient id="${uid}g1" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(74,158,136,.12)"/><stop offset="100%" stop-color="rgba(74,158,136,0)"/>
    </radialGradient>
    <radialGradient id="${uid}g2" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="rgba(74,158,136,.28)"/><stop offset="50%" stop-color="rgba(126,196,176,.12)"/><stop offset="100%" stop-color="rgba(74,158,136,.03)"/>
    </radialGradient>
    <filter id="${uid}glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="${uid}pulse"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>`;

  // ═══ 背景グロー（整いの波紋 — ゆっくり呼吸する） ═══
  svg+=`<circle cx="${cx}" cy="${cy}" r="${r*1.4}" fill="url(#${uid}g1)" opacity="0">
    <animate attributeName="opacity" values="0;.6;.6" dur="2s" fill="freeze"/>
    <animate attributeName="r" values="${r*.5};${r*1.4}" dur="2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
  </circle>`;
  // 呼吸する背景リング
  svg+=`<circle cx="${cx}" cy="${cy}" r="${r*1.1}" fill="none" stroke="rgba(74,158,136,.06)" stroke-width="40">
    <animate attributeName="r" values="${r*.9};${r*1.15};${r*.9}" dur="6s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;1;1" dur="2.5s" fill="freeze"/>
  </circle>`;

  // ═══ グリッド線（3レベル） — 順次フェードイン ═══
  [1,2,3].forEach((lv,li)=>{
    const pts=axes.map((_,i)=>pt(i,lv));
    const d=`M${pts.map((p,i)=>`${i?'L':''}${p[0]} ${p[1]}`).join(' ')} Z`;
    const op=lv===3?.25:.1+li*.03;
    const sw=lv===3?1.2:.6;
    svg+=`<path d="${d}" fill="none" stroke="rgba(42,58,52,${op})" stroke-width="${sw}" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="${0.2+li*0.15}s"/>
    </path>`;
  });

  // ═══ 軸線（ダッシュで放射） ═══
  axes.forEach((_,i)=>{
    const[ex,ey]=pt(i,3);
    svg+=`<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="rgba(42,58,52,.08)" stroke-width=".7" stroke-dasharray="4,4" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="${0.3+i*0.08}s"/>
    </line>`;
  });

  // ═══ データエリア（段階展開 — 蒸気が広がるように） ═══
  const dpts=axes.map((a,i)=>pt(i,sc[a.key]));
  const pathD=`M${dpts.map((p,i)=>`${i?'L':''}${p[0]} ${p[1]}`).join(' ')} Z`;
  const zeroD=`M${axes.map(()=>`${cx} ${cy}`).join(' L')} Z`;

  // ゴースト（ぼんやり先に広がる — サウナ蒸気っぽい）
  svg+=`<path d="${zeroD}" fill="url(#${uid}g2)" stroke="none" filter="url(#${uid}pulse)" opacity="0">
    <animate attributeName="d" from="${zeroD}" to="${pathD}" dur="1.8s" fill="freeze" begin="0.5s" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    <animate attributeName="opacity" from="0" to=".5" dur="1.2s" fill="freeze" begin="0.5s"/>
  </path>`;

  // メインエリア
  svg+=`<path d="${zeroD}" fill="url(#${uid}g2)" stroke="var(--accent-cool)" stroke-width="2" stroke-linejoin="round" filter="url(#${uid}glow)" opacity="0">
    <animate attributeName="d" from="${zeroD}" to="${pathD}" dur="1.6s" fill="freeze" begin="0.6s" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    <animate attributeName="opacity" from="0" to=".95" dur="1s" fill="freeze" begin="0.6s"/>
  </path>`;

  // ═══ データ点（順番に展開＋リングパルス） ═══
  dpts.forEach((p,i)=>{
    const delay=0.8+i*0.12;
    // 外リング（パルスエフェクト）
    svg+=`<circle cx="${p[0]}" cy="${p[1]}" r="0" fill="none" stroke="var(--accent-cool)" stroke-width="1" opacity="0">
      <animate attributeName="r" values="0;14;10" dur="0.8s" fill="freeze" begin="${delay}s" calcMode="spline" keySplines="0.16 1 0.3 1;0.25 0.46 0.45 0.94"/>
      <animate attributeName="opacity" values="0;.4;.15" dur="0.8s" fill="freeze" begin="${delay}s"/>
    </circle>`;
    // メイン点
    svg+=`<circle cx="${p[0]}" cy="${p[1]}" r="0" fill="var(--accent-cool)" opacity="0">
      <animate attributeName="r" values="0;7;5" dur="0.6s" fill="freeze" begin="${delay}s" calcMode="spline" keySplines="0.16 1 0.3 1;0.25 0.46 0.45 0.94"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="${delay}s"/>
    </circle>`;
    // 白い光点（サウナの水滴のきらめき）
    svg+=`<circle cx="${p[0]}" cy="${p[1]}" r="0" fill="white" opacity="0">
      <animate attributeName="r" values="0;3;1.5" dur="0.5s" fill="freeze" begin="${delay+0.1}s"/>
      <animate attributeName="opacity" values="0;.8;.3" dur="0.5s" fill="freeze" begin="${delay+0.1}s"/>
    </circle>`;
  });

  // ═══ ラベル（6軸 — 日本語名 + スコア% + カウントアップ風） ═══
  axes.forEach((a,i)=>{
    const[lx,ly]=pt(i,3);
    const ang=step*i-Math.PI/2;
    const pct=Math.round((sc[a.key]/3)*100);
    // ラベル位置調整（6角形）
    const dist=34;
    const ox=Math.cos(ang)*dist;
    const oy=Math.sin(ang)*dist;
    const tx=lx+ox, ty=ly+oy;
    const anchor=Math.abs(ox)<5?'middle':ox>0?'start':'end';
    const delay=1.2+i*0.1;

    svg+=`<g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" fill="freeze" begin="${delay}s"/>
      <text x="${tx}" y="${ty-4}" text-anchor="${anchor}" font-size="12.5" fill="var(--fg-cool)" font-family="var(--sans)" font-weight="600" opacity=".9">${a.label}</text>
      <text x="${tx}" y="${ty+14}" text-anchor="${anchor}" font-size="10" fill="var(--muted-cool)" font-family="var(--sans)" font-weight="300" letter-spacing=".5" opacity=".6">${a.sub}</text>
      <text x="${tx}" y="${ty+32}" text-anchor="${anchor}" font-size="22" fill="var(--accent-cool)" font-family="var(--serif)" font-weight="600">${pct}<tspan font-size="11" dy="-3" font-weight="400">%</tspan></text>
    </g>`;
  });

  svg+=`</svg>`;
  return svg;
}

    <div class="fade-s" style="text-align:center;padding:0 2rem 2rem;max-width:420px;margin:0 auto">

      <div style="display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap">
        <button onclick="(function(){var t='SAUNA PLAN 診断結果：${a.name}（${a.nameJa}）\\n${a.subtitle}\\n\\n';var u=location.origin+location.pathname+'?type='+state.result.id;window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(t)+'&url='+encodeURIComponent(u),'_blank','width=550,height=420')})()" style="display:inline-flex;align-items:center;gap:.4rem;background:rgba(0,0,0,.8);color:#fff;border:none;padding:.55rem 1.2rem;font-size:.6rem;letter-spacing:.1em;cursor:pointer;border-radius:24px;transition:all .3s ease" onmouseenter="this.style.transform='translateY(-2px)';this.style.background='#000'" onmouseleave="this.style.transform='translateY(0)';this.style.background='rgba(0,0,0,.8)'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          POST
        </button>
        <button onclick="(function(){var t='SAUNA PLAN 診断結果：${a.name}（${a.nameJa}）%0A${a.subtitle}%0A'+encodeURIComponent(location.origin+location.pathname+'?type='+state.result.id);window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(location.origin+location.pathname+'?type='+state.result.id)+'&text='+t,'_blank','width=550,height=420')})()" style="display:inline-flex;align-items:center;gap:.4rem;background:#06C755;color:#fff;border:none;padding:.55rem 1.2rem;font-size:.6rem;letter-spacing:.1em;cursor:pointer;border-radius:24px;transition:all .3s ease" onmouseenter="this.style.transform='translateY(-2px)';this.style.background='#05b34d'" onmouseleave="this.style.transform='translateY(0)';this.style.background='#06C755'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
          LINE
        </button>
        <button onclick="(function(){var u=location.origin+location.pathname+'?type='+state.result.id;navigator.clipboard.writeText(u).then(function(){var b=document.getElementById('copyLinkBtn');b.textContent='✓ COPIED';setTimeout(function(){b.textContent='COPY LINK'},2000)})})()" id="copyLinkBtn" style="display:inline-flex;align-items:center;gap:.4rem;background:rgba(74,158,136,.12);color:var(--accent-cool);border:1px solid rgba(74,158,136,.25);padding:.55rem 1.2rem;font-size:.6rem;letter-spacing:.1em;cursor:pointer;border-radius:24px;transition:all .3s ease" onmouseenter="this.style.transform='translateY(-2px)';this.style.background='rgba(74,158,136,.2)'" onmouseleave="this.style.transform='translateY(0)';this.style.background='rgba(74,158,136,.12)'">
          COPY LINK
        </button>
      </div>
    </div>

    ${spacer}

    <!-- ═══ FOOTER ═══ -->
    <div class="fade-s" style="text-align:center;padding:0 2rem 8rem">
      <div style="font-family:var(--serif);font-size:1.2rem;font-weight:300;color:var(--fg-cool);opacity:.5;margin-bottom:3rem;letter-spacing:.05em">
        I am <span style="color:var(--accent-cool);opacity:1">${a.name}</span>.
      </div>
      <button id="restartBtn" style="background:rgba(255,255,255,.5);border:none;color:var(--muted-cool);padding:1rem 3rem;font-size:.65rem;letter-spacing:.25em;cursor:pointer;text-transform:uppercase;transition:all .5s cubic-bezier(.25,.46,.45,.94);border-radius:40px;box-shadow:0 2px 12px rgba(74,158,136,.05)"
        onmouseenter="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 24px rgba(74,158,136,.1)';this.style.color='var(--accent-cool)'"
        onmouseleave="this.style.transform='translateY(0)';this.style.boxShadow='0 2px 12px rgba(74,158,136,.05)';this.style.color='var(--muted-cool)'">
        もう一度診断する
      </button>
      <div style="font-size:.65rem;color:var(--fg-cool);opacity:.4;margin-top:3rem;max-width:400px;margin-left:auto;margin-right:auto;line-height:1.8;font-weight:300;text-align:center">本診断はサウナ体験の参考情報であり、医学的助言ではありません。心血管疾患・高血圧等の持病がある方は、医師にご相談ください。施設情報・商品情報は変更される場合があります。</div>
      <div style="font-size:.45rem;color:var(--fg-cool);opacity:.3;margin-top:2rem;letter-spacing:.25em;text-transform:uppercase">Sauna Experience Designer — Tokyo, 2026</div>
    </div>
  </div>
  <!-- ═══ サウナ用語集 フローティングボタン ═══ -->
  <div id="glossaryBtn" onclick="document.getElementById('glossaryModal').style.display='flex'" style="position:fixed;bottom:2rem;right:2rem;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(74,158,136,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:100;transition:all .4s cubic-bezier(.25,.46,.45,.94);border:1px solid rgba(74,158,136,.15)" onmouseenter="this.style.transform='scale(1.1)';this.style.boxShadow='0 8px 32px rgba(74,158,136,.25)'" onmouseleave="this.style.transform='scale(1)';this.style.boxShadow='0 4px 24px rgba(74,158,136,.15)'">
    <span style="font-size:1.3rem">♨</span>
  </div>
  <!-- ═══ サウナ用語集 モーダル ═══ -->
  <div id="glossaryModal" onclick="if(event.target===this)this.style.display='none'" style="display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;background:rgba(42,58,52,.4);backdrop-filter:blur(6px);padding:1.5rem;animation:fadeIn .3s">
    <div style="background:var(--bg-cool);border-radius:16px;max-width:440px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);padding:2.5rem 2rem;position:relative">
      <button onclick="document.getElementById('glossaryModal').style.display='none'" style="position:absolute;top:1rem;right:1.2rem;background:none;border:none;font-size:1.2rem;color:var(--muted-cool);cursor:pointer;padding:.3rem">×</button>
      <div style="font-size:.5rem;letter-spacing:.4em;color:var(--muted-cool);text-transform:uppercase;margin-bottom:.5rem">Glossary</div>
      <h2 style="font-family:var(--serif);font-size:1.6rem;font-weight:400;color:var(--fg-cool);margin:0 0 1.5rem">サウナ用語集</h2>
      ${glossaryHtml}
    </div>
  </div>`;  /* closes result-body + glossary */

  // ═══ Gaikiyoku atmosphere — ふわり〜〜〜と漂うパーティクル ═══
  (function spawnGaikiyoku(){
    // 大きなぼかし球体（ゆっくり漂う）
    for(let i=0;i<6;i++){
      const p=document.createElement('div');
      p.className='gai-particle gai-particle--large';
      const size=80+Math.random()*120;
      p.style.width=size+'px';p.style.height=size+'px';
      p.style.left=Math.random()*100+'%';
      p.style.bottom=(-10-Math.random()*15)+'%';
      p.style.animationDuration=(18+Math.random()*14)+'s';
      p.style.animationDelay=(-Math.random()*16)+'s';
      document.body.appendChild(p);
    }
    // 緑のオーブ（中サイズ）
    for(let i=0;i<10;i++){
      const p=document.createElement('div');
      p.className='gai-particle gai-particle--orb';
      const size=6+Math.random()*14;
      p.style.width=size+'px';p.style.height=size+'px';
      p.style.left=Math.random()*100+'%';
      p.style.bottom=(-8-Math.random()*15)+'%';
      p.style.animationDuration=(9+Math.random()*10)+'s';
      p.style.animationDelay=(-Math.random()*10)+'s';
      document.body.appendChild(p);
    }
    // 白い光の粒子（小さい、キラキラ）
    for(let i=0;i<12;i++){
      const p=document.createElement('div');
      p.className='gai-particle gai-particle--light';
      const size=3+Math.random()*6;
      p.style.width=size+'px';p.style.height=size+'px';
      p.style.left=Math.random()*100+'%';
      p.style.bottom=(-5-Math.random()*10)+'%';
      p.style.animationDuration=(6+Math.random()*8)+'s';
      p.style.animationDelay=(-Math.random()*8)+'s';
      document.body.appendChild(p);
    }
    // 塵（微小、たくさん）
    for(let i=0;i<18;i++){
      const p=document.createElement('div');
      p.className='gai-particle gai-particle--dust';
      p.style.width='2px';p.style.height='2px';
      p.style.left=Math.random()*100+'%';
      p.style.bottom=(-5-Math.random()*10)+'%';
      p.style.animationDuration=(5+Math.random()*7)+'s';
      p.style.animationDelay=(-Math.random()*6)+'s';
      document.body.appendChild(p);
    }
    // 風 — 細い線
    for(let i=0;i<6;i++){
      const w=document.createElement('div');
      w.className='gai-wind';
      w.style.width=(180+Math.random()*350)+'px';
      w.style.top=(8+Math.random()*75)+'%';
      w.style.animationDuration=(10+Math.random()*10)+'s';
      w.style.animationDelay=(-Math.random()*12)+'s';
      document.body.appendChild(w);
    }
    // 風 — 太いうねり
    for(let i=0;i<4;i++){
      const w=document.createElement('div');
      w.className='gai-wind--wide';
      w.style.width=(350+Math.random()*600)+'px';
      w.style.top=(15+Math.random()*55)+'%';
      w.style.animationDuration=(14+Math.random()*12)+'s';
      w.style.animationDelay=(-Math.random()*16)+'s';
      document.body.appendChild(w);
    }
  })();

  // ═══ FADE IN — ふわり〜っと浮き上がる ═══
  const body=document.getElementById('result-body');
  setTimeout(()=>{body.style.opacity='1';},200);

  // 各セクションがふわり〜っと順番に浮き上がる
  document.querySelectorAll('.fade-s').forEach((sec,i)=>{
    sec.style.opacity='0';
    sec.style.transform='translateY(60px) scale(.97)';
    sec.style.transition='opacity 1.6s cubic-bezier(.25,.46,.45,.94), transform 1.8s cubic-bezier(.16,1,.3,1)';
    setTimeout(()=>{sec.style.opacity='1';sec.style.transform='translateY(0) scale(1)';},600+i*350);
  });

  document.getElementById('restartBtn').onclick=()=>{
    // Clean up gaikiyoku atmosphere
    document.querySelectorAll('.gai-particle,.gai-wind,.gai-wind--wide').forEach(p=>p.remove());
    const sky=document.getElementById('gaiSky');if(sky)sky.classList.remove('active');
    // Transition back to hot mode
    document.body.style.transition='background 1s ease, color 1s ease';
    document.body.style.background='var(--bg-hot)';
    document.body.style.color='var(--fg-hot)';
    steamBox.style.transition='opacity 1s ease';
    steamBox.style.opacity='1';
    heatOv.style.transition='opacity 1s ease';
    heatOv.style.opacity='1';
    setTimeout(()=>{state={phase:'intro',currentQ:0,answers:{},result:null,scores:null,selectedOpt:null};render();},500);
  };
}

// ─── INIT ──────────────────────────────────────────
// シェアリンク対応: ?type=xxx で直接結果表示
(function checkShareLink(){
  const params=new URLSearchParams(window.location.search);
  const typeId=params.get('type');
  if(typeId && ARCHETYPES[typeId]){
    // 中間スコアをアーキタイプのセンターから生成
    const a=ARCHETYPES[typeId];
    a.id=typeId;
    state.scores={};
    for(const ax of AXES) state.scores[ax]=a.center[ax];
    state.result=a;
    state.phase='result';
  }
})();
render();
</script>
